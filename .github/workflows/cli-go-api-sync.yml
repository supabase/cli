name: API Sync

on:
  repository_dispatch:
    types:
      - api-sync-staging
      - api-sync-prod
      - api-sync
  workflow_dispatch: # allow manual triggering
permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync API Types
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: apps/cli-go/go.mod
          cache: true

      - name: Resolve API sync source
        id: sync-source
        run: |
          event_type="${{ github.event.action }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            event_type="api-sync-staging"
          fi

          case "$event_type" in
            api-sync-prod)
              echo "environment=production" >> "$GITHUB_OUTPUT"
              echo "api_url=https://api.supabase.com" >> "$GITHUB_OUTPUT"
              ;;
            api-sync-staging | api-sync)
              echo "environment=staging" >> "$GITHUB_OUTPUT"
              echo "api_url=https://api.supabase.green" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported API sync event: $event_type" >&2
              exit 1
              ;;
          esac

      - name: Run Go codegen
        if: steps.sync-source.outputs.environment == 'staging'
        run: go generate
        working-directory: apps/cli-go

      - name: Download TypeScript OpenAPI spec
        run: pnpm --dir packages/api run generate:spec
        env:
          SUPABASE_API_URL: ${{ steps.sync-source.outputs.api_url }}

      - name: Check TypeScript OpenAPI spec
        id: ts-spec
        run: |
          if git diff --ignore-space-at-eol --exit-code --quiet -- packages/api/src/generated/openapi.json; then
            echo "OpenAPI spec is unchanged"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "OpenAPI spec changed"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Run TypeScript codegen
        if: steps.ts-spec.outputs.has_changes == 'true'
        run: pnpm --dir packages/api exec bun scripts/generate.ts

      - name: Check for changes
        id: check
        run: |
          if git diff --ignore-space-at-eol --exit-code --quiet -- apps/cli-go/pkg packages/api/src/generated; then
            echo "No changes detected"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Create Pull Request
        if: steps.check.outputs.has_changes == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore: sync API types from infrastructure"
          title: "chore: sync API types from infrastructure"
          body: |
            This PR was automatically created to sync API types from the ${{ steps.sync-source.outputs.environment }} infrastructure deployment.

            Changes were detected in the generated Go or TypeScript API code after syncing with the latest spec from infrastructure.
          branch: sync/api-types
          base: develop

      - name: Approve a PR
        if: steps.check.outputs.has_changes == 'true' && steps.cpr.outputs.pull-request-operation == 'created'
        continue-on-error: true
        run: gh pr review --approve --repo "${{ github.repository }}" "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable Pull Request Automerge
        if: steps.check.outputs.has_changes == 'true'
        run: gh pr merge --auto --squash --repo "${{ github.repository }}" "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
