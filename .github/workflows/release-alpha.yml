name: Release Alpha

on:
  workflow_dispatch:
    inputs:
      version:
        description: Alpha npm package version to publish
        required: true
        type: string
      dry_run:
        description: Dry run (skip actual publishing)
        required: false
        type: boolean
        default: true

jobs:
  release:
    uses: ./.github/workflows/release-shared.yml
    with:
      version: ${{ inputs.version }}
      shell: next
      npm_tag: alpha
      prerelease: true
      dry_run: ${{ inputs.dry_run }}
    secrets: inherit
