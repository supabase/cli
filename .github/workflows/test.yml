name: Test

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  check:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    name: Check code quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Check code quality
        run: pnpm run check:all

  test-core:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    name: Run unit and integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run unit and integration tests
        run: pnpm run test:core

  test-e2e:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    name: Run end-to-end tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set base and head SHAs for affected
        if: github.event_name == 'pull_request'
        uses: nrwl/nx-set-shas@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Initialize Go CLI submodule
        run: git submodule update --init .repos/supabase-cli-go

      - name: Cache Go CLI binary
        id: cache-go-binary
        uses: actions/cache@v4
        with:
          path: .repos/supabase-cli-go/supabase-go
          key: go-cli-${{ runner.os }}-${{ hashFiles('.repos/supabase-cli-go/**/*.go', '.repos/supabase-cli-go/go.mod', '.repos/supabase-cli-go/go.sum') }}

      - name: Setup Go
        if: steps.cache-go-binary.outputs.cache-hit != 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: .repos/supabase-cli-go/go.mod
          cache-dependency-path: .repos/supabase-cli-go/go.sum

      - name: Build Go CLI
        if: steps.cache-go-binary.outputs.cache-hit != 'true'
        run: go build -o supabase-go .
        working-directory: .repos/supabase-cli-go

      # TODO: Shard e2e tests across multiple machines: https://github.com/vitest-tests/test-sharding/blob/90ef5183fd30f7e4aa745adfaa750e071f86a6a0/.github/workflows/ci.yml
      - name: Run end-to-end tests (affected)
        if: github.event_name == 'pull_request'
        run: pnpm run affected:test:e2e
        env:
          SUPABASE_GO_BINARY: ${{ github.workspace }}/.repos/supabase-cli-go/supabase-go

      - name: Run end-to-end tests (all)
        if: github.event_name == 'push'
        run: pnpm run test:e2e
        env:
          SUPABASE_GO_BINARY: ${{ github.workspace }}/.repos/supabase-cli-go/supabase-go
