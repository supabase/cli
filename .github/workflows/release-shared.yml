name: Release Shared

on:
  workflow_call:
    inputs:
      version:
        description: npm package version to publish
        required: true
        type: string
      shell:
        description: CLI shell to package as the shipped supabase binary
        required: true
        type: string
      npm_tag:
        description: npm dist-tag to publish under
        required: true
        type: string
      prerelease:
        description: Whether the GitHub release should be marked as a prerelease
        required: true
        type: boolean
      dry_run:
        description: Dry run (skip actual publishing)
        required: true
        type: boolean
      build_only:
        description: Stop after the build matrix (skip smoke-test and downstream jobs)
        required: false
        type: boolean
        default: false
      publish_brew_scoop:
        description: Whether to update the Homebrew tap and Scoop bucket
        required: false
        type: boolean
        default: false
      brew_name:
        description: Homebrew formula name (e.g. supabase or supabase-beta)
        required: false
        type: string
        default: supabase
      scoop_name:
        description: Scoop manifest name (e.g. supabase or supabase-beta)
        required: false
        type: string
        default: supabase

jobs:
  build:
    runs-on: large-linux-arm
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Setup Go
        if: inputs.shell == 'legacy'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: apps/cli-go/go.mod
          cache: true
          cache-dependency-path: apps/cli-go/go.sum

      - name: Pre-download Go modules
        if: inputs.shell == 'legacy'
        working-directory: apps/cli-go
        run: go mod download -x

      - name: Install nfpm
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update
          sudo apt-get install -y nfpm

      - name: Sync versions
        run: pnpm exec bun apps/cli/scripts/sync-versions.ts --version ${{ inputs.version }}

      - name: Build all targets
        run: pnpm exec bun apps/cli/scripts/build.ts --version "${{ inputs.version }}" --shell "${{ inputs.shell }}"

      - name: Verify build artifacts
        run: |
          for target in cli-darwin-arm64 cli-darwin-x64 cli-linux-arm64 cli-linux-arm64-musl cli-linux-x64 cli-linux-x64-musl cli-windows-arm64 cli-windows-x64; do
            echo "Checking packages/$target/bin/..."
            ls -la "packages/$target/bin/"
          done
          echo "Checking dist/..."
          ls -la dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cli-build-${{ inputs.shell }}-${{ inputs.version }}
          path: |
            packages/cli-*/bin/
            dist/
          if-no-files-found: error
          retention-days: 1

  smoke-test:
    needs: build
    if: ${{ !inputs.build_only }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, macos-latest, macos-15-intel, windows-latest]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: cli-build-${{ inputs.shell }}-${{ inputs.version }}

      - name: Generate checksums
        run: pnpm exec bun apps/cli/scripts/checksums.ts --version ${{ inputs.version }}

      - name: Setup QEMU for cross-platform Docker
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Install Scoop
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          iex "& {$(irm get.scoop.sh)} -RunAsAdmin"
          Join-Path (Resolve-Path ~).Path "scoop\shims" >> $env:GITHUB_PATH

      - name: Fix binary permissions
        if: runner.os != 'Windows'
        run: chmod +x packages/cli-*/bin/supabase || true

      - name: Run smoke tests
        run: pnpm run test:smoke -- --version ${{ inputs.version }} --tag ${{ inputs.npm_tag }}
        working-directory: apps/cli

  publish:
    needs: smoke-test
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: cli-build-${{ inputs.shell }}-${{ inputs.version }}

      - name: Sync versions
        run: pnpm exec bun apps/cli/scripts/sync-versions.ts --version ${{ inputs.version }}

      - name: Publish to npm
        run: pnpm exec bun apps/cli/scripts/publish.ts --tag ${{ inputs.npm_tag }}

      - name: Generate checksums
        run: pnpm exec bun apps/cli/scripts/checksums.ts --version ${{ inputs.version }}

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          draft: true
          prerelease: ${{ inputs.prerelease }}
          files: |
            dist/supabase_${{ inputs.version }}_darwin_arm64.tar.gz
            dist/supabase_${{ inputs.version }}_darwin_amd64.tar.gz
            dist/supabase_${{ inputs.version }}_linux_arm64.tar.gz
            dist/supabase_${{ inputs.version }}_linux_amd64.tar.gz
            dist/supabase_${{ inputs.version }}_linux_arm64.deb
            dist/supabase_${{ inputs.version }}_linux_amd64.deb
            dist/supabase_${{ inputs.version }}_linux_arm64.rpm
            dist/supabase_${{ inputs.version }}_linux_amd64.rpm
            dist/supabase_${{ inputs.version }}_linux_arm64.apk
            dist/supabase_${{ inputs.version }}_linux_amd64.apk
            dist/supabase_${{ inputs.version }}_windows_amd64.zip
            dist/supabase_${{ inputs.version }}_windows_arm64.zip
            dist/checksums.txt

      - name: Publish GitHub Release (immutable)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit v${{ inputs.version }} --draft=false

  publish-homebrew:
    needs: publish
    if: ${{ !inputs.dry_run && inputs.publish_brew_scoop }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: cli-build-${{ inputs.shell }}-${{ inputs.version }}

      - name: Generate checksums
        run: pnpm exec bun apps/cli/scripts/checksums.ts --version ${{ inputs.version }}

      - name: Generate Homebrew tap token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            homebrew-tap

      - name: Configure git for tap push
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh auth setup-git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update Homebrew formula
        run: pnpm exec bun apps/cli/scripts/update-homebrew.ts --version ${{ inputs.version }} --name ${{ inputs.brew_name }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  publish-scoop:
    needs: publish
    if: ${{ !inputs.dry_run && inputs.publish_brew_scoop }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: cli-build-${{ inputs.shell }}-${{ inputs.version }}

      - name: Generate checksums
        run: pnpm exec bun apps/cli/scripts/checksums.ts --version ${{ inputs.version }}

      - name: Generate Scoop bucket token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            scoop-bucket

      - name: Configure git for bucket push
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh auth setup-git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update Scoop manifest
        run: pnpm exec bun apps/cli/scripts/update-scoop.ts --version ${{ inputs.version }} --name ${{ inputs.scoop_name }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}