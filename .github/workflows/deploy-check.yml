name: Check Deploy

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    if: github.head_ref != 'develop'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - run: |
          echo "Pull requests to main branch are only allowed from develop branch."
          exit 1
